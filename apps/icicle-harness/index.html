<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>icicle harness — kernel + dataview + editor</title>
    <style>
      :root {
        --bg: oklch(0.14 0 0);
        --panel: oklch(0.18 0 0);
        --ink: oklch(0.88 0 0);
        --muted: oklch(0.5 0 0);
        --border: oklch(0.25 0 0);
        --accent: oklch(0.65 0.15 240);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, system-ui, sans-serif;
        font-size: 13px;
        padding: 16px;
      }
      h1 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
      .sub { color: var(--muted); font-size: 11px; margin-bottom: 16px; }
      #app {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 12px;
        height: calc(100vh - 60px);
      }
      .tile {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
        position: relative;
      }
      .tile-label {
        position: absolute;
        top: 6px;
        left: 8px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: var(--muted);
        text-transform: uppercase;
        z-index: 1;
        pointer-events: none;
      }
      .status {
        position: absolute;
        top: 6px;
        right: 8px;
        font-size: 10px;
        color: var(--muted);
        z-index: 1;
        pointer-events: none;
        font-variant-numeric: tabular-nums;
      }
      .status.drafting { color: var(--accent); }
      v-icicle, v-side-table {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <h1>icicle harness</h1>
    <p class="sub">kernel · dataview · editor · cross-tile · one chart + one table on the same data</p>
    <div id="app">
      <div class="tile" id="icicle-tile">
        <span class="tile-label">icicle</span>
        <span class="status" id="icicle-status">idle</span>
        <v-icicle></v-icicle>
      </div>
      <div class="tile" id="table-tile">
        <span class="tile-label">side table</span>
        <span class="status" id="table-status">idle</span>
        <v-side-table></v-side-table>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
