<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>bireactive — layout backends spike</title>
    <style>
      :root { color-scheme: light dark; --fg: #1a1a1a; --bg: #fafaf8; --muted: #888; --border: #ddd; --accent: #2563eb; }
      @media (prefers-color-scheme: dark) {
        :root { --fg: #e8e8e8; --bg: #181818; --muted: #888; --border: #333; --accent: #60a5fa; }
      }
      * { box-sizing: border-box; }
      body { margin: 0; font: 14px/1.5 ui-sans-serif, system-ui, sans-serif; color: var(--fg); background: var(--bg); }
      header { padding: 18px 24px; border-bottom: 1px solid var(--border); }
      header h1 { margin: 0; font-size: 18px; font-weight: 600; }
      header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
      nav { padding: 10px 24px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; }
      nav button {
        padding: 6px 12px; border: 1px solid var(--border); background: transparent; color: var(--fg);
        font: inherit; cursor: pointer; border-radius: 4px;
      }
      nav button.active { background: var(--accent); color: white; border-color: var(--accent); }
      main { padding: 24px; }
      .spike { display: none; }
      .spike.active { display: block; }
      .spike h2 { margin: 0 0 4px; font-size: 16px; }
      .spike .blurb { color: var(--muted); margin: 0 0 16px; max-width: 70ch; }
      .stage { border: 1px solid var(--border); border-radius: 6px; padding: 16px; background: color-mix(in srgb, var(--bg) 70%, transparent); }
      .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
      .controls button { padding: 4px 10px; font: inherit; cursor: pointer; }
      .status { font-size: 12px; color: var(--muted); margin-top: 8px; min-height: 1.2em; }
    </style>
  </head>
  <body>
    <header>
      <h1>bireactive — nested-layered layout</h1>
      <p>Recursive group layout with bireactive's layered() propagator.</p>
    </header>
    <div id="toolbar" style="padding: 0 24px; border-bottom: 1px solid var(--border);"></div>
    <main id="main"></main>
    <link rel="stylesheet" href="./theme.css" />
    <script type="module" src="./main.ts"></script>
  </body>
</html>
