# Main Netlify config for sliceboard.netlify.app
# Builds docs site at root with sliceboard and demos mounted at subpaths
# See scripts/build-site.sh for the full build process

[build]
  base    = ""
  command = "npm run build"
  publish = "apps/docs/dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback for docs root
[[redirects]]
  from   = "/sliceboard/*"
  to     = "/sliceboard/:splat"
  status = 200

[[redirects]]
  from   = "/demos/*"
  to     = "/demos/:splat"
  status = 200
